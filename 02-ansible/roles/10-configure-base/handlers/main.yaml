---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600  # Update if cache is older than 1 hour (3600 seconds)
    clean: true
  become: true
  become_method: sudo
  ignore_errors: true
- name: Restart Server
  ansible.builtin.reboot:
    msg: "Rebooting for package update"
  become: true
  become_method: sudo
- name: Restart Containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
  become: true
  become_method: sudo
