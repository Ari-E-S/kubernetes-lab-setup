---

- hosts: all
  roles:
    - "10-configure-base"

- name: Add kubeadm init config to control planes
  hosts: controlplane
  gather_facts: false
  tasks:
    - name: Use template module to deploy config
      ansible.builtin.template:
        src: templates/kubeadm-config-init.yml.j2
        dest: /home/ubuntu/kubeadm-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

- hosts: controlplane[0]
  tasks:
    - block:
      - name: initialize kubernetes with the necessary args
        ansible.builtin.command:
          argv:
            - kubeadm
            - init
            - --config=/home/ubuntu/kubeadm-config.yaml
            - --upload-certs
          creates: /etc/kubernetes/admin.conf
        become: true
        register: k8s_init_output

      - name: copy kube config into ubuntu's home dir subfolder
        ansible.builtin.copy:
          remote_src: yes
          src: /etc/kubernetes/admin.conf
          dest: /home/ubuntu/.kube/config
          owner: ubuntu
          group: ubuntu
          mode: '600'
        become: true

      - name: copy kube config into config dir of local host
        ansible.builtin.fetch:
          src: /home/ubuntu/.kube/config
          dest: ../.kube/config
          flat: yes

      - name: generate join command
        ansible.builtin.shell: "kubeadm token create --print-join-command"
        register: join_command_output
        become: true
        changed_when: false

      - name: generate certificate key for use with join_command later
        ansible.builtin.shell: "kubeadm init phase upload-certs --upload-certs"
        register: certificate_key_output
        become: true
        changed_when: false

- hosts: all
  tasks:
    - name: save join command for other hosts to access them
      ansible.builtin.set_fact:
        join_command: "{{ hostvars[groups['controlplane'][0]]['join_command_output'].stdout }}"
        certificate_key: "{{ hostvars[groups['controlplane'][0]]['certificate_key_output'].stdout_lines[-1] }}"

- hosts: controlplane[1:]
  serial: 1
  tasks:
    - name: setup other control plane nodes
      ansible.builtin.shell:
        cmd: "{{ join_command }} --certificate-key {{ certificate_key }} --control-plane"
        creates: /etc/kubernetes/admin.conf
      become: true

    - name: copy kube config into ubuntu's home dir subfolder
      ansible.builtin.copy:
        remote_src: yes
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '600'
      become: true

- hosts: workers
  serial: 1
  tasks:
    - name: join worker nodes to the cluster
      ansible.builtin.shell:
        cmd: "{{ join_command }}"
        creates: /etc/kubernetes/pki/ca.crt
      become: true

- hosts: controlplane[0]
  gather_facts: true
  tasks:
    - name: Install Helm diff plugin
      kubernetes.core.helm_plugin:
        plugin_path: https://github.com/databus23/helm-diff
        state: present

    - name: Check if Cilium CLI exists
      ansible.builtin.stat:
        path: /home/ubuntu/.local/bin/cilium
      register: cilium_cli_status

    - block:
      - name: Set Cilium CLI architecture
        ansible.builtin.set_fact:
          cilium_cli_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

      - name: Get latest Cilium CLI version
        ansible.builtin.uri:
          url: https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt
          return_content: true
        register: cilium_latest_version

      - name: Download Cilium CLI tarball
        ansible.builtin.get_url:
          url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_latest_version.content | trim }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
          dest: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
          checksum: "sha256:https://github.com/cilium/cilium-cli/releases/download/{{ cilium_latest_version.content | trim }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz.sha256sum"
          mode: '0644'

      - name: Install Cilium CLI
        ansible.builtin.unarchive:
          src: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
          dest: "/home/ubuntu/.local/bin"
          remote_src: true

      - name: Clean up downloaded files
        ansible.builtin.file:
          path: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
          state: absent

      when: not cilium_cli_status.stat.exists

    - name: Deploy latest version of Cilium chart inside kube-system namespace
      kubernetes.core.helm:
        name: cilium
        chart_ref: oci://quay.io/cilium/charts/cilium
        release_namespace: kube-system
        create_namespace: true
        wait: true
        wait_timeout: 15m
        values:
          version: 1.19.2
          kubeProxyReplacement: true
          k8sServiceHost: "{{ ansible_facts['eth1']['ipv4']['address'] | default(ansible_facts['eth0']['ipv4']['address']) }}"
          k8sServicePort: 6443
          ipam:
            mode: "kubernetes"
          ingressController:
            enabled: true
            loadbalancerMode: "dedicated"
            default: true
          hostNetwork:
            enabled: true
          hubble:
            enabled: true
            ui:
              enabled: true
              service:
                type: LoadBalancer
            relay:
              enabled: true
              service:
                type: LoadBalancer
            tls:
              auto:
                enabled: true
                method: cronJob
          certgen:
            tolerations:
              - effect: NoSchedule
                key: node-role.kubernetes.io/master
                operator: Exists

    - name: Create default IP pool for Cilium LoadBalancerIPPool
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: "cilium.io/v2"
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: "default-ip-pool"
          spec:
            blocks:
              - cidr: "192.168.60.0/24"

    - name: Add metrics-server chart repo
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: "https://kubernetes-sigs.github.io/metrics-server/"

    - name: Deploy latest version of metrics-server chart inside kube-system namespace
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        wait: true
        wait_timeout: 15m
        values:
          args:
            - --kubelet-insecure-tls

    - name: Create monitoring namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: monitoring

    - name: Create a secret for Grafana admin password
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-admin-credentials
            namespace: monitoring
          type: Opaque
          stringData:
            admin-user: admin
            ldap-toml: ""
            admin-password: "{{ lookup('ansible.builtin.password', '/dev/null seed=' + inventory_hostname) }}"
      no_log: true

    - name: Add kube-prometheus-stack chart repo
      kubernetes.core.helm_repository:
        name: kube-prometheus-stack
        repo_url: "https://prometheus-community.github.io/helm-charts"

    - name: Deploy latest version of kube-prometheus-stack chart inside monitoring namespace with values
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: kube-prometheus-stack/kube-prometheus-stack
        release_namespace: monitoring
        wait: true
        wait_timeout: 15m
        values:
          prometheus-node-exporter:
            hostRootFsMount:
              enabled: true
          grafana:
            admin:
              existingSecret: "grafana-admin-credentials"
