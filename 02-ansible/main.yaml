---

- hosts: all
  roles:
    - "10-configure-base"

- name: Get the name of the primary control plane
  hosts: all
  gather_facts: false
  tasks:
    - name: Print the primary control plane's name
      ansible.builtin.debug:
        msg: "The primary control plane node is: {{ groups['controlplane'][0] }}"
      run_once: true

    - name: Use template module to deploy config
      ansible.builtin.template:
        src: templates/kubeadm-config-init.yml.j2
        dest: /home/ubuntu/kubeadm-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      when:
        - "'controlplane' in group_names"
        # - inventory_hostname == groups['controlplane'][0]
        - inventory_hostname in groups['controlplane']

- hosts: controlplane[0]
  tasks:
    - block:
      - name: initialize kubernetes with the necessary args
        ansible.builtin.command:
          argv:
            - kubeadm
            - init
            - -config=/home/ubuntu/kubeadm-config.yaml
            - --upload-certs
          creates: /etc/kubernetes/admin.conf
        become: true
        register: k8s_init_output

      - name: copy kube config into ubuntu's home dir subfolder
        ansible.builtin.copy:
          remote_src: yes
          src: /etc/kubernetes/admin.conf
          dest: /home/ubuntu/.kube/config
          owner: ubuntu
          group: ubuntu
          mode: '600'
        become: true

      - name: generate join command
        ansible.builtin.shell: "kubeadm token create --print-join-command"
        register: join_command_output
        become: true

      - name: generate certificate key for use with join_command later
        ansible.builtin.shell: "kubeadm init phase upload-certs --upload-certs"
        register: certificate_key_output
        become: true

- hosts: all
  tasks:
    - name: save join command for other hosts to access them
      ansible.builtin.set_fact:
        join_command: "{{ hostvars[groups['controlplane'][0]]['join_command_output'].stdout }}"
        certificate_key: "{{ hostvars[groups['controlplane'][0]]['certificate_key_output'].stdout_lines[-1] }}"

- hosts: controlplane[1:]
  serial: 1
  tasks:
    - name: setup other control plane nodes
      ansible.builtin.shell:
        cmd: "{{ join_command }} --certificate-key {{ certificate_key }} --control-plane"
        creates: /etc/kubernetes/admin.conf
      become: true

    - name: copy kube config into ubuntu's home dir subfolder
      ansible.builtin.copy:
        remote_src: yes
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '600'
      become: true

- hosts: workers
  serial: 1
  tasks:
    - name: join worker nodes to the cluster
      ansible.builtin.shell:
        cmd: "{{ join_command }} --certificate-key {{ certificate_key }}"
        creates: /etc/kubernetes/pki/ca.crt
      become: true

