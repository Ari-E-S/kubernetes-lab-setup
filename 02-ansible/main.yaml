---

- name: Configure base settings on all hosts
  hosts: all
  any_errors_fatal: true
  roles:
    - "10-configure-base"
  # vars:
  #   kubernetes_repo_version: "v1.35"
  #   sandbox_image_version: "3.10.1"
  #   etcd_version: "v3.6.10"

- name: Initialize the cluster
  hosts: controlplane[0]
  any_errors_fatal: true
  roles:
    - "15-init-controlplane"

- name: Join worker nodes to the cluster
  hosts: workers
  serial: 1
  tasks:
    - name: Save join command for other hosts to access them
      ansible.builtin.set_fact:
        join_command: "{{ hostvars[groups['controlplane'][0]]['join_command_output'].stdout }}"
        certificate_key: "{{ hostvars[groups['controlplane'][0]]['certificate_key_output'].stdout_lines[-1] }}"

    - name: Join worker nodes to the cluster
      ansible.builtin.command:
        cmd: "{{ join_command }}"
        creates: /etc/kubernetes/pki/ca.crt
      become: true

- name: Join worker nodes to the cluster
  hosts: controlplane[0]
  tasks:
    - name: Wait for all nodes to be Ready
      kubernetes.core.k8s_info:
        kind: Node
      register: node_list
      until: >
        node_list.resources | length > 0 and
        node_list.resources | map(attribute='status.conditions') |
        map('selectattr', 'type', 'equalto', 'Ready') |
        map('map', attribute='status') | flatten | select('equalto', 'True') |
        list | length == node_list.resources | length
      retries: 20
      delay: 10

- name: Install metrics-server and kube-prometheus-stack monitoring
  hosts: controlplane[0]
  gather_facts: true
  tasks:
    - name: Add metrics-server chart repo
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: "https://kubernetes-sigs.github.io/metrics-server/"

    - name: Deploy latest version of metrics-server chart inside kube-system namespace
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        wait: true
        wait_timeout: 15m
        values:
          args:
            - --kubelet-insecure-tls

    - name: Create monitoring namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: monitoring

    - name: Create a secret for Grafana admin password (UNSAFE!!)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-admin-credentials
            namespace: monitoring
          type: Opaque
          stringData:
            admin-user: admin
            ldap-toml: ""
            admin-password: "{{ lookup('ansible.builtin.password', '/dev/null seed=' + inventory_hostname) }}"
      no_log: true

    - name: Add kube-prometheus-stack chart repo
      kubernetes.core.helm_repository:
        name: kube-prometheus-stack
        repo_url: "https://prometheus-community.github.io/helm-charts"

    - name: Deploy latest version of kube-prometheus-stack chart inside monitoring namespace with values
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: kube-prometheus-stack/kube-prometheus-stack
        release_namespace: monitoring
        wait: true
        wait_timeout: 15m
        values:
          prometheus-node-exporter:
            hostRootFsMount:
              enabled: true
          grafana:
            admin:
              existingSecret: "grafana-admin-credentials"
