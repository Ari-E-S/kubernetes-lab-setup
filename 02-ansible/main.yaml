---

- name: Configure base settings on all hosts
  hosts: all
  roles:
    - "10-configure-base"

- name: Add kubeadm init config to control planes
  hosts: controlplane
  gather_facts: false
  tasks:
    - name: Use template module to deploy config
      ansible.builtin.template:
        src: templates/kubeadm-config-init.yml.j2
        dest: /home/ubuntu/kubeadm-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

- name: Initialize first control plane node
  hosts: controlplane[0]
  tasks:
    - name: Initialize kubernetes with the necessary args
      ansible.builtin.command:
        argv:
          - kubeadm
          - init
          - --config=/home/ubuntu/kubeadm-config.yaml
          - --upload-certs
        creates: /etc/kubernetes/admin.conf
      become: true
      register: k8s_init_output

    - name: Copy kube config into ubuntu's home dir subfolder
      ansible.builtin.copy:
        remote_src: true
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '600'
      become: true

    - name: Copy kube config into config dir of local host
      ansible.builtin.fetch:
        src: /home/ubuntu/.kube/config
        dest: ../.kube/config
        flat: true

    - name: Generate join command
      ansible.builtin.command:
        argv:
          - kubeadm
          - token
          - create
          - --print-join-command
      register: join_command_output
      become: true
      changed_when: false

    - name: Generate certificate key for use with join_command later
      ansible.builtin.command:
        argv:
          - kubeadm
          - init
          - phase
          - upload-certs
          - --upload-certs
      register: certificate_key_output
      become: true
      changed_when: false

- name: Save join command and certificate key as facts for other hosts to access
  hosts: all
  tasks:
    - name: Save join command for other hosts to access them
      ansible.builtin.set_fact:
        join_command: "{{ hostvars[groups['controlplane'][0]]['join_command_output'].stdout }}"
        certificate_key: "{{ hostvars[groups['controlplane'][0]]['certificate_key_output'].stdout_lines[-1] }}"

- name: Join worker nodes to the cluster
  hosts: workers
  serial: 1
  tasks:
    - name: Join worker nodes to the cluster
      ansible.builtin.command:
        cmd: "{{ join_command }}"
        creates: /etc/kubernetes/pki/ca.crt
      become: true

- name: Install Cilium CNI and kube-prometheus-stack monitoring
  hosts: controlplane[0]
  gather_facts: true
  tasks:
    - name: Install Helm diff plugin
      kubernetes.core.helm_plugin:
        plugin_path: https://github.com/databus23/helm-diff
        state: present

    - name: Check if Cilium CLI exists
      ansible.builtin.stat:
        path: /home/ubuntu/.local/bin/cilium
      register: cilium_cli_status

    - name: Install Cilium CLI if not present
      when: not cilium_cli_status.stat.exists
      block:
        - name: Create .local/bin directory if it doesn't exist
          ansible.builtin.file:
            path: /home/ubuntu/.local/bin
            state: directory
            owner: ubuntu
            group: ubuntu
            mode: '0755'

        - name: Get latest Cilium CLI version
          ansible.builtin.uri:
            url: https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt
            return_content: true
          register: cilium_latest_stable_version

        - name: Set Cilium CLI version info
          ansible.builtin.set_fact:
            cilium_cli_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
            cilium_cli_ver: "{{ cilium_latest_stable_version.content | trim }}"

        - name: Download Cilium CLI tarball
          ansible.builtin.get_url:
            url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_ver }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
            dest: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
            checksum: "sha256:https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_ver }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz.sha256sum"
            mode: '0644'

        - name: Install Cilium CLI
          ansible.builtin.unarchive:
            src: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
            dest: "/home/ubuntu/.local/bin"
            remote_src: true

        - name: Clean up downloaded files
          ansible.builtin.file:
            path: "/tmp/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
            state: absent

    - name: Deploy latest version of Cilium chart inside kube-system namespace
      kubernetes.core.helm:
        name: cilium
        chart_ref: oci://quay.io/cilium/charts/cilium
        release_namespace: kube-system
        create_namespace: true
        wait: true
        wait_timeout: 15m
        values:
          version: 1.19.2
          kubeProxyReplacement: true
          k8sServiceHost: "{{ ansible_facts['eth1']['ipv4']['address'] | default(ansible_facts['eth0']['ipv4']['address']) }}"
          k8sServicePort: 6443
          hubble:
            enabled: true
            ui:
              enabled: true
            relay:
              enabled: true
            tls:
              auto:
                enabled: true
                method: cronJob
          certgen:
            tolerations:
              - effect: NoSchedule
                key: node-role.kubernetes.io/master
                operator: Exists

    - name: Add metrics-server chart repo
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: "https://kubernetes-sigs.github.io/metrics-server/"

    - name: Deploy latest version of metrics-server chart inside kube-system namespace
      kubernetes.core.helm:
        name: metrics-server
        chart_ref: metrics-server/metrics-server
        release_namespace: kube-system
        wait: true
        wait_timeout: 15m
        values:
          args:
            - --kubelet-insecure-tls

    - name: Create monitoring namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: monitoring

    - name: Create a secret for Grafana admin password (UNSAFE!!)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-admin-credentials
            namespace: monitoring
          type: Opaque
          stringData:
            admin-user: admin
            ldap-toml: ""
            admin-password: "{{ lookup('ansible.builtin.password', '/dev/null seed=' + inventory_hostname) }}"
      no_log: true

    - name: Add kube-prometheus-stack chart repo
      kubernetes.core.helm_repository:
        name: kube-prometheus-stack
        repo_url: "https://prometheus-community.github.io/helm-charts"

    - name: Deploy latest version of kube-prometheus-stack chart inside monitoring namespace with values
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: kube-prometheus-stack/kube-prometheus-stack
        release_namespace: monitoring
        wait: true
        wait_timeout: 15m
        values:
          prometheus-node-exporter:
            hostRootFsMount:
              enabled: true
          grafana:
            admin:
              existingSecret: "grafana-admin-credentials"
